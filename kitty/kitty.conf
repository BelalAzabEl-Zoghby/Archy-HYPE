shell /usr/bin/zsh
include ~/.config/omarchy/current/theme/kitty.conf

# Font
font_family JetBrainsMono Nerd Font
bold_italic_font auto
font_size        9.0

# Window
window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# Allow remote access
allow_remote_control yes

# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# تقليل الـ FPS بتاع الـ Rendering عشان متستهلكش الـ GPU في الفاضي
repaint_delay 10
input_delay 2
sync_to_monitor no

# تخفيف الـ Graphics (ده بيخلي الـ Terminal يفتح في أجزاء من الثانية)
background_opacity 0.3
dynamic_background_opacity yes

# تقليل الـ Latency لأقصى حد
input_delay 0
repaint_delay 2
# منع الـ V-sync لو مش محتاجه عشان الفريمات تزيد
sync_to_monitor no

initial_window_width  1
initial_window_height 1

# تقليل التأخير بين الكيبورد والشاشة (Latency)
input_delay 0
repaint_delay 2

# منع الـ Sync مع الشاشة عشان الفريمات تفتح
sync_to_monitor no

# تخفيف الـ Graphics على جهاز 2016
background_opacity 0.3
dynamic_background_opacity yes

# استخدام الـ GPU في الريندرينج بأقصى طاقة
linux_display_server wayland
